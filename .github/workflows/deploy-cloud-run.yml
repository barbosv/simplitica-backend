name: Deploy to Cloud Run

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Stripe mode"
        required: true
        default: "dev"

permissions:
  contents: read
  id-token: write



jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm test

  deploy:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'dev' }}
    env:
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      GCP_REGION: ${{ vars.GCP_REGION || 'us-central1' }}
      GCP_ARTIFACT_REPO: ${{ vars.GCP_ARTIFACT_REPO || 'simplitica' }}
      GCP_CLOUD_SQL_INSTANCE: ${{ vars.GCP_CLOUD_SQL_INSTANCE }}
      GCP_RUNTIME_SERVICE_ACCOUNT: ${{ vars.GCP_RUNTIME_SERVICE_ACCOUNT }}
      GCP_DEPLOY_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      CLOUD_RUN_SERVICE: ${{ vars.CLOUD_RUN_SERVICE || 'simplitica-backend' }}
      PUBLIC_API_URL: ${{ vars.PUBLIC_API_URL }}
      STRIPE_MODE: ${{ vars.STRIPE_MODE || 'test' }}
      APPLE_ENVIRONMENT: ${{ vars.APPLE_ENVIRONMENT || 'Production' }}
      STRIPE_CONNECT_RETURN_URL: ${{ vars.STRIPE_CONNECT_RETURN_URL || 'https://simpli-invoice.simplitica.co/stripe/return' }}
      STRIPE_CONNECT_REFRESH_URL: ${{ vars.STRIPE_CONNECT_REFRESH_URL || 'https://simpli-invoice.simplitica.co/stripe/refresh' }}
      STRIPE_PLATFORM_COUNTRY: ${{ vars.STRIPE_PLATFORM_COUNTRY || 'US' }}
      SIMPLI_INVOICE_BUNDLE_ID: ${{ vars.SIMPLI_INVOICE_BUNDLE_ID || 'co.simplitica.simpli-invoice' }}
      SIMPLI_INVOICE_APP_APPLE_ID: ${{ vars.SIMPLI_INVOICE_APP_APPLE_ID }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${{ env.GCP_REGION }}-docker.pkg.dev" --quiet

      - name: Build and push image
        env:
          IMAGE: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GCP_ARTIFACT_REPO }}/simplitica-backend
        run: |
          docker build -t "$IMAGE:${{ github.sha }}" -t "$IMAGE:latest" .
          docker push "$IMAGE:${{ github.sha }}"
          docker push "$IMAGE:latest"

      - name: Validate deploy configuration
        run: |
          missing=()
          [ -z "${{ env.GCP_PROJECT_ID }}" ] && missing+=("GCP_PROJECT_ID")
          [ -z "${{ env.GCP_CLOUD_SQL_INSTANCE }}" ] && missing+=("GCP_CLOUD_SQL_INSTANCE")
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "Missing GitHub variables: ${missing[*]}"
            exit 1
          fi

      - name: Deploy to Cloud Run
        env:
          IMAGE: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GCP_ARTIFACT_REPO }}/simplitica-backend:${{ github.sha }}
        run: |
          DEPLOY_ARGS=(
            "${{ env.CLOUD_RUN_SERVICE }}"
            --image="$IMAGE"
            --region="${{ env.GCP_REGION }}"
            --platform=managed
            --allow-unauthenticated
            --port=8080
            --cpu=1
            --memory=512Mi
            --min-instances=1
            --timeout=60
            --cpu-boost
            --add-cloudsql-instances="${{ env.GCP_CLOUD_SQL_INSTANCE }}"
            --set-secrets=DATABASE_URL=DATABASE_URL:latest,STRIPE_SECRET_KEY=STRIPE_SECRET_KEY:latest,STRIPE_WEBHOOK_SECRET=STRIPE_WEBHOOK_SECRET:latest,STRIPE_SECRET_KEY_LIVE=STRIPE_SECRET_KEY_LIVE:latest,STRIPE_WEBHOOK_SECRET_LIVE=STRIPE_WEBHOOK_SECRET_LIVE:latest,HOME_DEPOT_DATA_API_KEY=HOME_DEPOT_DATA_API_KEY:latest,RETAILERAPI_KEY=RETAILERAPI_KEY:latest,BLS_API_KEY=BLS_API_KEY:latest,SIMPLITICA_CLIENT_API_KEY=SIMPLITICA_CLIENT_API_KEY:latest,OPENAI_API_KEY=OPENAI_API_KEY:latest,SIMPLILIST_BACKEND_API_KEY=SIMPLILIST_BACKEND_API_KEY:latest
          )
          ENV_VARS="NODE_ENV=production,STORAGE_BACKEND=postgres,RUN_MIGRATIONS=true,STRIPE_MODE=${{ env.STRIPE_MODE }},APPLE_ENVIRONMENT=${{ env.APPLE_ENVIRONMENT }},STRIPE_CONNECT_RETURN_URL=${{ env.STRIPE_CONNECT_RETURN_URL }},STRIPE_CONNECT_REFRESH_URL=${{ env.STRIPE_CONNECT_REFRESH_URL }},STRIPE_PLATFORM_COUNTRY=${{ env.STRIPE_PLATFORM_COUNTRY }},SIMPLI_INVOICE_BUNDLE_ID=${{ env.SIMPLI_INVOICE_BUNDLE_ID }}"
          if [ -n "${{ env.SIMPLI_INVOICE_APP_APPLE_ID }}" ]; then
            ENV_VARS="${ENV_VARS},SIMPLI_INVOICE_APP_APPLE_ID=${{ env.SIMPLI_INVOICE_APP_APPLE_ID }}"
          fi
          DEPLOY_ARGS+=(--set-env-vars="$ENV_VARS")
          if [ -n "${{ env.GCP_RUNTIME_SERVICE_ACCOUNT }}" ]; then
            DEPLOY_ARGS+=(--service-account="${{ env.GCP_RUNTIME_SERVICE_ACCOUNT }}")
          fi
          gcloud run deploy "${DEPLOY_ARGS[@]}"

      - name: Grant deploy SA invoker (org may block allUsers)
        run: |
          gcloud run services add-iam-policy-binding "${{ env.CLOUD_RUN_SERVICE }}" \
            --region="${{ env.GCP_REGION }}" \
            --member="serviceAccount:${{ env.GCP_DEPLOY_SERVICE_ACCOUNT }}" \
            --role="roles/run.invoker" \
            --quiet

      - name: Resolve Cloud Run URL
        id: run-url
        run: |
          URL=$(gcloud run services describe "${{ env.CLOUD_RUN_SERVICE }}" \
            --region="${{ env.GCP_REGION }}" \
            --format='value(status.url)')
          echo "url=${URL}" >> "$GITHUB_OUTPUT"

      - id: id-token
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          token_format: id_token
          id_token_audience: ${{ steps.run-url.outputs.url }}
          create_credentials_file: false

      - name: Smoke check
        run: |
          curl -fsS -H "Authorization: Bearer ${{ steps.id-token.outputs.id_token }}" \
            "${{ steps.run-url.outputs.url }}/health"
          echo "Deployed to ${{ steps.run-url.outputs.url }} (authenticated /health OK)"
          if [ -n "${{ env.PUBLIC_API_URL }}" ]; then
            echo "Custom domain ${{ env.PUBLIC_API_URL }} — configure DNS + domain mapping; Stripe needs public invoker (org policy may block allUsers)."
          fi
